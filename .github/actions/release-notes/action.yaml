name: Prepare release notes
description: Prepare release notes for an upcoming release

inputs:
  version:
    description: The version to use for release notes.
    required: true
  release-type:
    description: One of 'major', 'minor', 'patch', or 'next'.
    default: major

runs:
  using: composite
  steps:
    - name: Get previous version
      id: previous
      uses: actions/github-script@v8
      with:
        result-encoding: string
        script: |
          const tags = await github.rest.repos.listTags({
            owner: context.repo.owner,
            repo: context.repo.repo,
            per_page: 2,
          });
          return tags.data[1]?.name ?? '';

    - name: Generate release notes
      if: ${{ inputs.release-type != 'next' }}
      id: notes
      uses: actions/github-script@v8
      env:
        PREVIOUS_TAG: ${{ steps.previous.outputs.result }}
        NEW_VERSION: ${{ inputs.version }}
      with:
        result-encoding: string
        script: |
          const response = await github.rest.repos.generateReleaseNotes({
            owner: context.repo.owner,
            repo: context.repo.repo,
            previous_tag_name: process.env.PREVIOUS_TAG,
            tag_name: `v${process.env.NEW_VERSION}`,
          })
          return response.data.body;

    # -------------------------------------------
    # Major/minor
    # -------------------------------------------
    - name: Create RELEASES.md
      if: ${{ inputs.release-type == 'major' || inputs.release-type == 'minor' }}
      shell: bash
      env:
        NOTES: ${{ steps.notes.outputs.result }}
      run: |
        set -euo pipefail
        body=$(sed -n '/---/,$!p' RELEASES.md)
        archive=$(sed -n '/---/,$p' RELEASES.md)
        {
          printf '%s\n\n' "$body"
          printf '%s\n\n' "$NOTES"
          printf '%s\n' "$archive"
        } > RELEASES.md.new
        mv RELEASES.md.new RELEASES.md

    # -------------------------------------------
    # Patch
    # -------------------------------------------
    - name: Patch RELEASES.md
      if: ${{ inputs.release-type == 'patch' }}
      shell: bash
      env:
        NOTES: ${{ steps.notes.outputs.result }}
      run: |
        set -euo pipefail
        title=$(sed -n '1p' RELEASES.md)
        previous=$(cat RELEASES.md)
        {
          printf '%s\n\n' "$title"
          printf 'Unreleased\n\n## Fixed\n\n'
          printf '%s\n\n' "$NOTES"
          printf -- '---\n\n'
          printf '%s\n' "$previous"
        } > RELEASES.md.new
        mv RELEASES.md.new RELEASES.md

    # -------------------------------------------
    # Next
    # -------------------------------------------
    - name: Update archive list
      if: ${{ inputs.release-type == 'next' }}
      shell: bash
      env:
        REPOSITORY: ${{ github.repository }}
      run: |
        set -euxo pipefail
        title=$(sed -n '1p' RELEASES.md)
        version=${title#"## "}
        version_x="${version%?}x"
        sed -i "/ARCHIVE_START/a * [${version_x}](https://github.com/${REPOSITORY}/blob/release-${version}/RELEASES.md)" RELEASES.md

    - name: Create next release notes
      if: ${{ inputs.release-type == 'next' }}
      shell: bash
      run: |
        set -euxo pipefail
        title=$(sed -n '1p' RELEASES.md)
        archive=$(sed -n '/---/,$p' RELEASES.md)
        {
          printf '%s\n\n' "$title"
          printf 'Unreleased\n\n### Added\n\n### Changed\n\n'
          printf '%s\n' "$archive"
        } > RELEASES.md.new
        mv RELEASES.md.new RELEASES.md

    - name: Update branch with changes
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        git commit -am "Update release notes for $VERSION"
