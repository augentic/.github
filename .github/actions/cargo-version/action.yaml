name: Cargo version
description: Get the version from Cargo.toml.

inputs:
  increment:
    description: |
      The version number or one of 'none', 'major', 'minor', 'patch'.
      If 'none', the current version is returned.
    default: none

outputs:
  version:
    description: Cargo version
    value: ${{ steps.read.outputs.version }}

runs:
  using: composite
  steps:
    - name: Install cargo-edit
      if: ${{ inputs.increment != 'none' }}
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-edit

    - name: Bump version
      if: ${{ inputs.increment != 'none' }}
      shell: bash
      env:
        INCREMENT: ${{ inputs.increment }}
      run: |
        set -euo pipefail
        case "$INCREMENT" in
          major|minor|patch)
            cargo set-version --workspace --bump "$INCREMENT"
            ;;
          *)
            cargo set-version --workspace "$INCREMENT"
            ;;
        esac
        cargo generate-lockfile

    - name: Read version
      id: read
      shell: bash
      run: |
        set -euo pipefail
        version=$(cargo metadata --no-deps --format-version 1 \
          | jq -r '.packages[0].version')
        echo "version=$version" >> "$GITHUB_OUTPUT"

    - name: Update RELEASES.md heading
      if: ${{ inputs.increment != 'none' }}
      shell: bash
      env:
        VERSION: ${{ steps.read.outputs.version }}
      run: |
        set -euo pipefail
        sed -i "1 s/^.*$/## $VERSION/" RELEASES.md

    - name: Commit
      if: ${{ inputs.increment != 'none' }}
      shell: bash
      env:
        VERSION: ${{ steps.read.outputs.version }}
      run: |
        git commit -am "Increment Cargo version to $VERSION"
