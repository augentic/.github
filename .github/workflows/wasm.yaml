# Builds and publishes a wasm guest.

name: Publish Wasm Guest

on:
  workflow_call:
    inputs:
      package:
        type: string
        required: true
        description: The Cargo package name.
      app-name:
        type: string
        description: The Container App name.
      storage-account:
        type: string
        required: true
        description: The Azure Storage Account to use for the wasm file.
      resource-group:
        type: string
        required: true
        description: The Azure Resource Group to use when restarting the Container App.
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ inputs.package }}-${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-wasip2-${{ inputs.package }}

      - name: Resolve names
        env:
          INPUT_APP_NAME: ${{ inputs.app-name }}
          INPUT_PACKAGE: ${{ inputs.package }}
          INPUT_RESOURCE_GROUP: ${{ inputs.resource-group }}
        run: |
          echo "APP_NAME=${INPUT_APP_NAME:-$INPUT_PACKAGE}" >> "$GITHUB_ENV"
          echo "WASM_FILE=${INPUT_PACKAGE//-/_}" >> "$GITHUB_ENV"
          echo "RESOURCE_GROUP=$INPUT_RESOURCE_GROUP" >> "$GITHUB_ENV"

      - name: Build wasm component
        env:
          PACKAGE: ${{ inputs.package }}
        run: cargo build --package "$PACKAGE" --release --target wasm32-wasip2 --locked

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload wasm
        env:
          STORAGE_ACCOUNT: ${{ inputs.storage-account }}
        run: |
          az storage file upload \
            --account-name "$STORAGE_ACCOUNT" \
            --share-name wasm \
            --source "./target/wasm32-wasip2/release/${WASM_FILE}.wasm" \
            --path "${APP_NAME}.wasm"

      - name: Restart Container App
        run: |
          latestRevision=$(az containerapp revision list \
            --name "ca-$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "[?properties.active].name | [0]" -o tsv)
          test -n "$latestRevision" || { echo "no active revision"; exit 1; }

          az containerapp revision restart \
            --name "ca-$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --revision "$latestRevision"
